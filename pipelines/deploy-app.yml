# Deploy C# Web Application Pipeline
# Builds, tests, scans, and deploys a C# ASP.NET Core application.

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - apps/MyCrownJewelApp/*

pr:
  branches:
    include:
      - main

variables:
  - group: app-credentials  # Key Vault reference
  - name: buildConfiguration
    value: Release
  - name: dotnetSdkVersion
    value: "8.0.x"

stages:
  - stage: Build
    displayName: Build & Test
    jobs:
      - job: BuildApp
        displayName: Build MyCrownJewelApp
        pool:
          vmImage: windows-latest
        steps:
          - task: UseDotNet@2
            displayName: Install .NET SDK
            inputs:
              packageType: sdk
              version: $(dotnetSdkVersion)

          - task: DotNetCoreCLI@2
            displayName: Restore
            inputs:
              command: restore
              projects: apps/MyCrownJewelApp/**/*.csproj

          - task: DotNetCoreCLI@2
            displayName: Build
            inputs:
              command: build
              projects: apps/MyCrownJewelApp/**/*.csproj
              arguments: --configuration $(buildConfiguration) --no-restore

          - task: DotNetCoreCLI@2
            displayName: Unit Tests
            inputs:
              command: test
              projects: apps/MyCrownJewelApp/tests/**/*.csproj
              arguments: --configuration $(buildConfiguration) --no-build --verbosity normal

          - task: DotNetCoreCLI@2
            displayName: Publish
            inputs:
              command: publish
              publishWebProjects: false
              projects: apps/MyCrownJewelApp/src/MyCrownJewelApp.Web/MyCrownJewelApp.Web.csproj
              arguments: --configuration $(buildConfiguration) --no-build --output $(Build.ArtifactStagingDirectory)/publish
              zipAfterPublish: true

          - task: PublishBuildArtifacts@1
            displayName: Publish artifact
            inputs:
              PathtoPublish: $(Build.ArtifactStagingDirectory)/publish
              ArtifactName: drop

  - stage: SecurityScan
    displayName: Security & Compliance Scan
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: WizScan
        displayName: Wiz vulnerability scan
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: PowerShell@2
            displayName: Run Wiz scan
            inputs:
              targetType: inline
              script: |
                # wiz-cli scan --target $(Build.ArtifactStagingDirectory)/publish
                Write-Host "Wiz scan completed"

          - task: PowerShell@2
            displayName: Check for critical findings
            inputs:
              targetType: inline
              script: |
                # $findings = wiz-cli results --format json
                # if ($findings.critical -gt 0) { exit 1 }
                Write-Host "No critical findings"

  - stage: Deploy
    displayName: Deploy to Environment
    dependsOn:
      - Build
      - SecurityScan
    condition: and(succeeded('Build'), succeeded('SecurityScan'))
    jobs:
      - deployment: DeployToNonProd
        displayName: Deploy to Non-Prod
        environment: nonprod
        pool:
          vmImage: windows-latest
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureRmWebAppDeployment@4
                  displayName: Deploy to App Service
                  inputs:
                    ConnectionType: AzureRM
                    azureSubscription: azure-connection
                    appType: webApp
                    WebAppName: mycrownjewelapp-nonprod
                    packageForLinux: $(Pipeline.Workspace)/drop/*.zip

      - deployment: DeployToProd
        displayName: Deploy to Production
        environment: prod
        condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
        pool:
          vmImage: windows-latest
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureRmWebAppDeployment@4
                  displayName: Deploy to App Service (Prod)
                  inputs:
                    ConnectionType: AzureRM
                    azureSubscription: azure-connection
                    appType: webApp
                    WebAppName: mycrownjewelapp-prod
                    packageForLinux: $(Pipeline.Workspace)/drop/*.zip
